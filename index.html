<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>几何乐园·小学数学</title>
  
  <!-- 引用外部manifest -->
  <link rel="manifest" href="manifest.json">
  
  <!-- 苹果设备图标 -->
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  
  <!-- 备用favicon -->
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
  
  <!-- PWA必要meta -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#ff8a65">
  
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      background: linear-gradient(135deg, #4fc3f7 0%, #ff8a65 100%);
      font-family: 'Comic Sans MS', 'Chalkboard SE', '幼圆', Yuanti SC, system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 15px;
    }
    
    .app-container {
      max-width: 1000px;
      width: 100%;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 60px 60px 40px 40px;
      padding: 25px 20px;
      box-shadow: 0 30px 40px rgba(0,0,0,0.2), 0 0 0 5px #ffd93d;
      backdrop-filter: blur(10px);
      position: relative;
    }
    
    .app-container::before {
      content: '🔺 ⬛ ⚪';
      position: absolute;
      top: -30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 30px;
      background: #ffd93d;
      padding: 5px 25px;
      border-radius: 50px;
      box-shadow: 0 5px 0 #ff9f4b;
    }
    
    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 15px;
      margin: 20px 0 15px 0;
      background: #ff8a65;
      padding: 15px 25px;
      border-radius: 60px;
      border: 4px solid #4fc3f7;
    }
    
    .title-main {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    
    .title-main span:first-child {
      font-size: 3rem;
      filter: drop-shadow(2px 4px 0 #ff6b6b);
    }
    
    .title-main span:last-child {
      font-size: 2rem;
      font-weight: 800;
      color: white;
      text-shadow: 3px 3px 0 #4fc3f7;
    }
    
    .install-btn {
      background: #ff6b6b;
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 40px;
      font-size: 1.2rem;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 6px 0 #b23b3b;
      transition: 0.1s;
      border: 3px solid white;
      font-family: inherit;
    }
    
    .install-btn:active {
      transform: translateY(6px);
      box-shadow: none;
    }
    
    .install-btn.hidden {
      display: none;
    }
    
    .subtitle {
      background: #4fc3f7;
      color: white;
      padding: 15px 25px;
      border-radius: 40px;
      margin-bottom: 20px;
      font-size: 1.2rem;
      font-weight: 600;
      text-align: center;
      border: 4px solid #ff8a65;
      box-shadow: 0 5px 0 #1e88e5;
    }
    
    .card {
      background: #f8f9ff;
      border-radius: 50px;
      padding: 25px 20px;
      margin: 20px 0;
      border: 4px solid #4fc3f7;
      box-shadow: 0 8px 0 #1e88e5;
    }
    
    .flex-row {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      align-items: center;
      justify-content: space-between;
    }
    
    .timer-card {
      background: #2c3e50;
      color: #ffd93d;
      border-radius: 50px;
      padding: 15px 30px;
      box-shadow: 0 8px 0 #1a2632;
      border: 4px solid #ff8a65;
    }
    
    .timer-display {
      font-size: 3.5rem;
      font-weight: 800;
      letter-spacing: 8px;
      font-family: 'Courier New', monospace;
      text-shadow: 0 0 10px #ffd93d;
    }
    
    button {
      background: #4fc3f7;
      border: none;
      color: white;
      font-weight: 800;
      padding: 15px 30px;
      border-radius: 50px;
      font-size: 1.2rem;
      box-shadow: 0 6px 0 #1e88e5;
      cursor: pointer;
      border: 3px solid white;
      transition: 0.1s;
      font-family: inherit;
    }
    
    button:active {
      transform: translateY(6px);
      box-shadow: none;
    }
    
    button:disabled {
      opacity: 0.5;
      transform: none;
      box-shadow: 0 6px 0 #1e88e5;
      pointer-events: none;
    }
    
    .diff-pill {
      display: flex;
      background: white;
      border-radius: 60px;
      border: 4px solid #ff8a65;
      overflow: hidden;
    }
    
    .diff-pill label {
      padding: 12px 28px;
      cursor: pointer;
      font-size: 1.2rem;
      font-weight: 700;
      transition: 0.1s;
    }
    
    input[type="radio"] { display: none; }
    input[type="radio"]:checked + span { 
      background: #4fc3f7; 
      color: white;
      display: block;
      padding: 12px 28px;
      margin: -12px -28px;
    }
    
    .ques-item {
      background: #fff9e6;
      border-radius: 40px;
      padding: 20px;
      margin-bottom: 15px;
      border: 4px solid #4fc3f7;
      box-shadow: 0 5px 0 #1e88e5;
    }
    
    .ques-header {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 15px;
    }
    
    .ques-text {
      font-size: 1.3rem;
      font-weight: 600;
      color: #4a4a4a;
    }
    
    .meta-badge {
      background: #4fc3f7;
      color: white;
      border-radius: 40px;
      padding: 8px 20px;
      font-size: 1rem;
      font-weight: 700;
      border: 3px solid white;
    }
    
    .geometry-svg {
      background: #f0f8ff;
      border-radius: 30px;
      padding: 15px;
      margin: 15px 0;
      text-align: center;
      border: 2px solid #ff8a65;
    }
    
    .geometry-svg svg {
      max-width: 100%;
      height: auto;
    }
    
    .answer-area {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 15px;
      margin: 15px 0;
    }
    
    .options-group {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin: 10px 0;
    }
    
    .options-group label {
      background: #e3f2fd;
      padding: 8px 16px;
      border-radius: 40px;
      border: 2px solid #2196f3;
      cursor: pointer;
      transition: 0.1s;
    }
    
    .options-group label.selected {
      background: #2196f3;
      color: white;
    }
    
    .options-group input[type="radio"] {
      display: none;
    }
    
    .ans-input {
      width: 150px;
      padding: 12px 20px;
      border-radius: 50px;
      border: 4px solid #ff8a65;
      font-size: 1.2rem;
      text-align: center;
      font-family: inherit;
    }
    
    .result-badge {
      font-weight: 800;
      padding: 10px 25px;
      border-radius: 40px;
      font-size: 1.1rem;
      border: 3px solid white;
    }
    
    .correct-badge { background: #8bc34a; color: white; }
    .wrong-badge { background: #ff6b6b; color: white; }
    .pending-badge { background: #ffd93d; color: #4a4a4a; }
    
    .hint-section {
      margin-top: 15px;
      border-top: 2px dashed #ff8a65;
      padding-top: 15px;
    }
    
    .child-hint {
      background: #e3f2fd;
      border-radius: 30px;
      padding: 12px 18px;
      font-size: 1.1rem;
      border-left: 8px solid #2196f3;
      color: #0d3c61;
      margin-bottom: 10px;
    }
    
    .parent-hint {
      background: #fff3e0;
      border-radius: 30px;
      padding: 12px 18px;
      font-size: 1rem;
      border-left: 8px solid #ff9800;
      color: #663c00;
      margin-top: 10px;
    }
    
    .parent-btn {
      background: #ff9800;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 30px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 3px 0 #b26a00;
      transition: 0.1s;
      border: 2px solid white;
    }
    
    .parent-btn:active {
      transform: translateY(3px);
      box-shadow: none;
    }
    
    .hidden {
      display: none;
    }
    
    .history-panel {
      background: #2c3e50;
      color: #ffd93d;
      border-radius: 40px;
      padding: 20px;
      font-size: 1rem;
      max-height: 180px;
      overflow-y: auto;
      border: 4px solid #ff8a65;
    }
    
    .mistake-panel {
      background: #fff0f0;
      border: 6px dashed #ff6b6b;
      border-radius: 50px;
      padding: 20px;
      margin: 20px 0;
    }
    
    .mistake-item {
      background: white;
      border-radius: 30px;
      padding: 12px 18px;
      margin-bottom: 10px;
      border: 2px solid #ff6b6b;
    }
    
    .footer-actions {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      margin-top: 20px;
    }
    
    hr {
      border: 4px solid #4fc3f7;
      border-radius: 10px;
      margin: 30px 0;
    }
    
    .deco-geometry {
      display: flex;
      justify-content: space-around;
      margin: 10px 0;
      font-size: 2rem;
    }
    
    .offline-badge {
      background: #ff6b6b;
      color: white;
      padding: 5px 15px;
      border-radius: 30px;
      font-size: 0.9rem;
      font-weight: 600;
      margin-left: 10px;
      display: inline-block;
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="deco-geometry">
    <span>🔺</span> <span>⬛</span> <span>⚪</span> <span>🔷</span> <span>📐</span>
  </div>
  
  <div class="title-row">
    <div class="title-main">
      <span>📐</span>
      <span>几何乐园</span>
    </div>
    <button class="install-btn" id="installBtn">
      📲 安装到设备
    </button>
  </div>
  
  <div class="subtitle">
    🌟 基础6类 · 🎯 奥数8类 · 📝 错题本 · 💡 双层提示
    <span id="offlineIndicator" class="offline-badge" style="display:none;">📴 离线模式</span>
  </div>

  <div class="card">
    <div class="flex-row">
      <div class="diff-pill">
        <label><input type="radio" name="diff" value="初级" checked><span>🐣 初级</span></label>
        <label><input type="radio" name="diff" value="中级"><span>🦊 中级</span></label>
        <label><input type="radio" name="diff" value="高级"><span>🦉 高级</span></label>
      </div>
      <button id="startBtn">🚀 开始20分钟挑战</button>
    </div>
    <div class="flex-row" style="margin-top: 25px;">
      <div class="timer-card"><span class="timer-display" id="timer">20:00</span></div>
      <button id="submitBtn" disabled>✅ 提交所有答案</button>
    </div>
  </div>

  <div id="questionsContainer">
    <div class="ques-item" style="text-align:center; padding:40px;">
      🎮 点击"开始20分钟挑战"生成题目
    </div>
  </div>

  <hr>
  <div style="display: flex; justify-content: space-between; align-items: center; margin: 20px 0;">
    <h2 style="color:#4a4a4a; font-size:2rem;">📋 练习记录</h2>
    <button id="clearMistakesBtn" style="background:#ff6b6b; box-shadow:0 6px 0 #b23b3b;">🗑️ 清空错题</button>
  </div>
  <div class="history-panel" id="historyLog">暂无练习记录</div>
  <div class="mistake-panel" id="mistakeContainer">📕 还没有错题，继续加油！</div>

  <div class="footer-actions">
    <button id="exportBtn" style="background:#6c5ce7;">📎 导出错题</button>
    <button id="demoBtn" style="background:#ff9f4b;">🧪 添加示例错题</button>
    <span style="flex:1; text-align:right; font-size:1rem; color:#4a4a4a;">🐼 快乐学几何 v6.0</span>
  </div>
</div>

<script>
(function(){
  // ========== 注册 Service Worker ==========
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
      navigator.serviceWorker.register('service-worker.js').then(function(registration) {
        console.log('ServiceWorker 注册成功:', registration.scope);
        if (!navigator.onLine) {
          document.getElementById('offlineIndicator').style.display = 'inline-block';
        }
      }).catch(function(error) {
        console.log('ServiceWorker 注册失败:', error);
      });
    });
    
    window.addEventListener('online', function() {
      document.getElementById('offlineIndicator').style.display = 'none';
    });
    
    window.addEventListener('offline', function() {
      document.getElementById('offlineIndicator').style.display = 'inline-block';
    });
  }

  // ========== SVG图形生成函数 ==========
  const GeometrySVG = {
    // 圆锥体
    cone: () => `
      <svg width="200" height="200" viewBox="0 0 200 200">
        <line x1="60" y1="150" x2="100" y2="40" stroke="#333" stroke-width="3"/>
        <line x1="140" y1="150" x2="100" y2="40" stroke="#333" stroke-width="3"/>
        <path d="M60,150 A40,15 0 0,1 140,150" fill="none" stroke="#666" stroke-width="2" stroke-dasharray="4,4"/>
        <path d="M60,150 A40,15 0 0,0 140,150" fill="none" stroke="#333" stroke-width="3"/>
        <circle cx="100" cy="40" r="2" fill="red"/>
      </svg>
    `,
    
    // 圆柱体
    cylinder: () => `
      <svg width="200" height="200" viewBox="0 0 200 200">
        <ellipse cx="100" cy="50" rx="50" ry="15" fill="none" stroke="#333" stroke-width="3"/>
        <path d="M50,150 A50,15 0 0,1 150,150" fill="none" stroke="#666" stroke-width="2" stroke-dasharray="4,4"/>
        <path d="M50,150 A50,15 0 0,0 150,150" fill="none" stroke="#333" stroke-width="3"/>
        <line x1="50" y1="50" x2="50" y2="150" stroke="#333" stroke-width="3"/>
        <line x1="150" y1="50" x2="150" y2="150" stroke="#333" stroke-width="3"/>
      </svg>
    `,
    
    // 长方体
    cube: () => `
      <svg width="220" height="200" viewBox="0 0 220 200">
        <rect x="50" y="50" width="100" height="80" fill="none" stroke="#333" stroke-width="3"/>
        <polygon points="50,50 100,20 200,20 150,50" fill="none" stroke="#333" stroke-width="3"/>
        <polygon points="150,50 200,20 200,100 150,130" fill="none" stroke="#333" stroke-width="3"/>
        <rect x="100" y="20" width="100" height="80" fill="none" stroke="#666" stroke-width="2" stroke-dasharray="5,5"/>
        <line x1="50" y1="130" x2="100" y2="100" stroke="#666" stroke-width="2" stroke-dasharray="5,5"/>
        <line x1="150" y1="130" x2="200" y2="100" stroke="#666" stroke-width="2" stroke-dasharray="5,5"/>
      </svg>
    `,
    
    // 球体
    sphere: () => `
      <svg width="200" height="200" viewBox="0 0 200 200">
        <circle cx="100" cy="100" r="80" fill="none" stroke="#333" stroke-width="3"/>
        <path d="M20,100 A80,30 0 0,0 180,100" fill="none" stroke="#333" stroke-width="3"/>
        <path d="M20,100 A80,30 0 0,1 180,100" fill="none" stroke="#666" stroke-width="2" stroke-dasharray="5,5"/>
        <circle cx="100" cy="100" r="2" fill="red"/>
      </svg>
    `
  };

  // ========== 基础题库模板（全部带解析） ==========
  const BASE_TEMPLATES = [
    {
      type: "平面图形认识",
      generate: () => {
        const questions = [
          { 
            text: "🔺 三角形有____条边？ A. 2 B. 3 C. 4", 
            ans: "B", 
            childHint: "🤔 数一数三角形有几条边？", 
            parentHint: "三角形有3条边" 
          },
          { 
            text: "⬛ 正方形有____个角？ A. 3 B. 4 C. 5", 
            ans: "B", 
            childHint: "🤔 正方形有几个角？", 
            parentHint: "正方形有4个角" 
          },
          { 
            text: "⚪ 圆有____个角？ A. 0 B. 1 C. 无数", 
            ans: "A", 
            childHint: "🤔 圆是曲线围成的，没有角", 
            parentHint: "圆没有角，所以答案是0" 
          }
        ];
        return questions[Math.floor(Math.random() * questions.length)];
      }
    },
    {
      type: "周长计算",
      generate: () => {
        const length = Math.floor(Math.random() * 4) + 5;
        const width = Math.floor(Math.random() * 3) + 3;
        return {
          text: `📏 一个长方形的长是${length}厘米，宽是${width}厘米，它的周长是多少厘米？`,
          ans: (length + width) * 2,
          childHint: `🤔 长方形周长 = (长 + 宽) × 2`,
          parentHint: `(${length} + ${width}) × 2 = ${(length + width) * 2}厘米`
        };
      }
    },
    {
      type: "面积计算",
      generate: () => {
        const side = Math.floor(Math.random() * 4) + 4;
        return {
          text: `📐 一个正方形的边长是${side}厘米，它的面积是多少平方厘米？`,
          ans: side * side,
          childHint: `🤔 正方形面积 = 边长 × 边长`,
          parentHint: `${side} × ${side} = ${side * side}平方厘米`
        };
      }
    },
    {
      type: "图形拼组",
      generate: () => {
        return {
          text: `🧩 两个完全相同的等腰直角三角形可以拼成什么图形？ A. 正方形 B. 长方形 C. 梯形`,
          ans: "A",
          childHint: `🤔 等腰直角三角形的两个直角边相等，拼在一起会形成正方形`,
          parentHint: `两个等腰直角三角形可以拼成一个正方形`
        };
      }
    },
    {
      type: "角的初步认识",
      generate: () => {
        const angles = [
          { desc: "小于90°", type: "锐角", ans: "A" },
          { desc: "等于90°", type: "直角", ans: "B" },
          { desc: "大于90°", type: "钝角", ans: "C" }
        ];
        const q = angles[Math.floor(Math.random() * angles.length)];
        return {
          text: `📐 ${q.desc}的角是什么角？ A. 锐角 B. 直角 C. 钝角`,
          ans: q.ans,
          childHint: `🤔 锐角<90°，直角=90°，钝角>90°`,
          parentHint: `这是一个${q.type}`
        };
      }
    },
    {
      type: "立体图形认识",
      generate: () => {
        const questions = [
          { 
            text: "🧊 魔方是什么形状？ A. 长方体 B. 正方体 C. 圆柱", 
            ans: "B", 
            childHint: "🤔 魔方的每个面都是正方形", 
            parentHint: "魔方是正方体" 
          },
          { 
            text: "🧊 足球是什么形状？ A. 长方体 B. 正方体 C. 球", 
            ans: "C", 
            childHint: "🤔 足球可以朝任何方向滚动", 
            parentHint: "足球是球体" 
          },
          { 
            text: "🥫 易拉罐是什么形状？ A. 圆柱 B. 圆锥 C. 球", 
            ans: "A", 
            childHint: "🤔 易拉罐上下一样粗，有两个圆面", 
            parentHint: "易拉罐是圆柱体" 
          }
        ];
        return questions[Math.floor(Math.random() * questions.length)];
      }
    }
  ];

  // ========== 奥数题库模板（全部带解析） ==========
  const OLYMPIC_TEMPLATES = [
    {
      type: "等积变换",
      generate: () => {
        return {
          text: `📐 下图中，D是BC中点，E是AC中点，三角形ADE的面积是整个三角形面积的几分之几？`,
          svg: `
            <svg width="200" height="180" viewBox="0 0 200 180">
              <polygon points="100,30 170,150 30,150" fill="none" stroke="#ff8a65" stroke-width="3"/>
              <line x1="100" y1="30" x2="100" y2="150" stroke="#4fc3f7" stroke-dasharray="5,5"/>
              <line x1="50" y1="90" x2="150" y2="90" stroke="#4fc3f7" stroke-dasharray="5,5"/>
            </svg>
          `,
          options: ["A. 1/2", "B. 1/4", "C. 1/8"],
          ans: "B",
          childHint: `🤔 连接中点，三角形面积被等分成4份`,
          parentHint: `三角形ADE是原三角形面积的1/4`
        };
      }
    },
    {
      type: "几何模型应用",
      generate: () => {
        return {
          text: `🦋 下图中，AD∥BC，对角线交于O，三角形AOD面积是5，三角形COB面积是20，梯形面积是多少？`,
          svg: `
            <svg width="220" height="160" viewBox="0 0 220 160">
              <polygon points="50,30 170,30 200,130 20,130" fill="none" stroke="#ff8a65" stroke-width="3"/>
            </svg>
          `,
          options: ["A. 45", "B. 40", "C. 35"],
          ans: "A",
          childHint: `🤔 蝴蝶模型中，左右两个三角形面积相等`,
          parentHint: `S△AOB=S△COD=10，总面积=5+20+10+10=45`
        };
      }
    },
    {
      type: "格点与面积",
      generate: () => {
        return {
          text: `🔲 下图内部格点3个，边上格点6个，面积是多少？（皮克定理）`,
          svg: `
            <svg width="200" height="160" viewBox="0 0 200 160">
              <polygon points="30,30 170,30 150,130 50,130" fill="none" stroke="#ff8a65" stroke-width="3"/>
              <circle cx="80" cy="60" r="3" fill="red"/>
              <circle cx="120" cy="60" r="3" fill="red"/>
              <circle cx="100" cy="90" r="3" fill="red"/>
            </svg>
          `,
          options: ["A. 5", "B. 6", "C. 7"],
          ans: "B",
          childHint: `🤔 面积 = 内部格点数 + 边上格点数÷2 - 1`,
          parentHint: `3 + 6÷2 - 1 = 3 + 3 - 1 = 6`
        };
      }
    },
    {
      type: "圆与扇形",
      generate: () => {
        return {
          text: `⚪ 一个圆的半径是4厘米，它的周长是多少厘米？（π取3.14）`,
          ans: 25.12,
          childHint: `🤔 圆周长 = 2πr`,
          parentHint: `2 × 3.14 × 4 = 25.12厘米`
        };
      }
    },
    {
      type: "立体图形进阶",
      generate: () => {
        return {
          text: `🧊 下图是一个圆锥，底面半径3厘米，高5厘米，它的体积是多少立方厘米？`,
          svg: GeometrySVG.cone(),
          ans: Math.round(3.14 * 3 * 3 * 5 / 3 * 100) / 100,
          childHint: `🤔 圆锥体积 = 1/3 × 底面积 × 高`,
          parentHint: `3.14 × 3² × 5 ÷ 3 = 47.1立方厘米`
        };
      }
    },
    {
      type: "图形分割与拼补",
      generate: () => {
        return {
          text: `🧩 下图正方形边长8，阴影部分的面积是多少？`,
          svg: `
            <svg width="160" height="160" viewBox="0 0 160 160">
              <rect x="30" y="30" width="100" height="100" fill="none" stroke="#ff8a65" stroke-width="3"/>
              <path d="M30,30 L80,80 L130,130 L130,30 L80,80 L30,130" fill="#4fc3f7" opacity="0.5"/>
            </svg>
          `,
          options: ["A. 32", "B. 48", "C. 64"],
          ans: "A",
          childHint: `🤔 阴影面积占正方形面积的一半`,
          parentHint: `正方形面积64，一半是32`
        };
      }
    },
    {
      type: "正方体展开图",
      generate: () => {
        return {
          text: `📦 下图可以折叠成正方体吗？`,
          svg: `
            <svg width="220" height="200" viewBox="0 0 220 200">
              <!-- 上面单独的面 -->
              <rect x="70" y="20" width="40" height="40" fill="#ff8a65" stroke="#333" stroke-width="2"/>
              
              <!-- 中间四个面 -->
              <rect x="30" y="60" width="40" height="40" fill="#4fc3f7" stroke="#333" stroke-width="2"/>
              <rect x="70" y="60" width="40" height="40" fill="#81c784" stroke="#333" stroke-width="2"/>
              <rect x="110" y="60" width="40" height="40" fill="#ffd54f" stroke="#333" stroke-width="2"/>
              <rect x="150" y="60" width="40" height="40" fill="#ba68c8" stroke="#333" stroke-width="2"/>
              
              <!-- 下面单独的面 -->
              <rect x="70" y="100" width="40" height="40" fill="#ff8a65" stroke="#333" stroke-width="2"/>
            </svg>
          `,
          options: ["A. 可以", "B. 不可以"],
          ans: "A",
          childHint: `🤔 这是1-4-1型展开图，可以折叠成正方体`,
          parentHint: `这是标准的1-4-1型正方体展开图，上面1个、中间4个、下面1个，共6个面`
        };
      }
    },
    {
      type: "几何计数",
      generate: () => {
        return {
          text: `🔢 下图中共有几个三角形？`,
          svg: `
            <svg width="200" height="180" viewBox="0 0 200 180">
              <polygon points="100,30 170,150 30,150" fill="none" stroke="#ff8a65" stroke-width="3"/>
              <line x1="100" y1="30" x2="100" y2="150" stroke="#4fc3f7" stroke-dasharray="5,5"/>
              <line x1="50" y1="90" x2="150" y2="90" stroke="#4fc3f7" stroke-dasharray="5,5"/>
            </svg>
          `,
          options: ["A. 6个", "B. 8个", "C. 10个"],
          ans: "B",
          childHint: `🤔 先数单个小三角形，再数组合的`,
          parentHint: `单个4个 + 2个组成的2个 + 4个组成的2个 = 8个`
        };
      }
    }
  ];

  function generateQuestionsFromTemplates(templates, count) {
    const shuffled = [...templates];
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    return shuffled.slice(0, count).map(template => {
      const generated = template.generate();
      return {
        ...generated,
        mainCat: BASE_TEMPLATES.includes(template) ? "基础题" : "奥数题",
        subCat: template.type,
        userAnswer: null,
        isCorrect: null,
        options: generated.options || ["A", "B", "C"]
      };
    });
  }

  window.toggleParentHint = function(idx) {
    const hintDiv = document.getElementById(`parentHint_${idx}`);
    if (hintDiv) hintDiv.classList.toggle('hidden');
  };

  const app = {
    currentQuestions: [],
    timerInterval: null,
    secondsLeft: 1200,
    active: false,
    difficulty: '初级',
    mistakeList: [],
    deferredPrompt: null,
    submitted: false,
    BASE_TEMPLATES: BASE_TEMPLATES,
    OLYMPIC_TEMPLATES: OLYMPIC_TEMPLATES,

    init: function() {
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        this.deferredPrompt = e;
      });

      document.getElementById('installBtn').addEventListener('click', () => {
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        const isAndroid = /Android/.test(navigator.userAgent);
        
        let message = '';
        if (isIOS) {
          message = '📱 在iPad/iPhone上安装：\n\n1. 点击底部中间的「分享」按钮 📤\n2. 向下滑动，选择「添加到主屏幕」\n3. 点击右上角「添加」';
        } else if (isAndroid) {
          message = '📱 在安卓手机上安装：\n\n1. 点击右上角菜单「⋯」\n2. 选择「添加到主屏幕」\n3. 点击「自动添加」';
        } else {
          message = '💻 在电脑上安装：\n\n1. 点击地址栏右侧的「安装」图标 ➕\n2. 或者点击右上角菜单「⋯」→「应用」→「将此站点作为应用安装」';
        }
        alert(message);
      });

      document.getElementById('startBtn').addEventListener('click', () => this.startNew());
      document.getElementById('submitBtn').addEventListener('click', () => this.submitAll());
      document.getElementById('clearMistakesBtn').addEventListener('click', () => this.clearMistakes());
      document.getElementById('exportBtn').addEventListener('click', () => this.exportMistakes());
      document.getElementById('demoBtn').addEventListener('click', () => this.addDemoMistake());

      document.querySelectorAll('input[name="diff"]').forEach(r => {
        r.addEventListener('change', (e) => { this.difficulty = e.target.value; });
      });

      this.loadMistakes();
    },

    startNew: function() {
      if(this.timerInterval) clearInterval(this.timerInterval);
      this.secondsLeft = 1200;
      this.active = true;
      this.submitted = false;
      this.updateTimer();
      this.generatePaper();
      this.timerInterval = setInterval(() => this.tick(), 1000);
      document.getElementById('submitBtn').disabled = false;
      document.getElementById('startBtn').disabled = true;
      this.addLog(`▶ 开始 ${this.difficulty} 难度练习`);
    },

    tick: function() {
      if(!this.active) return;
      this.secondsLeft--;
      this.updateTimer();
      if(this.secondsLeft <= 0) {
        this.secondsLeft = 0;
        this.updateTimer();
        this.active = false;
        clearInterval(this.timerInterval);
        document.getElementById('startBtn').disabled = false;
        document.getElementById('submitBtn').disabled = true;
        this.addLog("⌛ 时间到，练习结束");
      }
    },

    updateTimer: function() {
      const m = Math.floor(this.secondsLeft / 60);
      const s = this.secondsLeft % 60;
      document.getElementById('timer').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    },

    generatePaper: function() {
      const totalQuestions = 6;
      if (this.difficulty === '初级') {
        this.currentQuestions = generateQuestionsFromTemplates(BASE_TEMPLATES, totalQuestions);
      } else if (this.difficulty === '高级') {
        this.currentQuestions = generateQuestionsFromTemplates(OLYMPIC_TEMPLATES, totalQuestions);
      } else {
        const baseCount = Math.floor(totalQuestions * 0.7);
        const olympicCount = totalQuestions - baseCount;
        const baseQuestions = generateQuestionsFromTemplates(BASE_TEMPLATES, baseCount);
        const olympicQuestions = generateQuestionsFromTemplates(OLYMPIC_TEMPLATES, olympicCount);
        this.currentQuestions = [...baseQuestions, ...olympicQuestions];
        for (let i = this.currentQuestions.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [this.currentQuestions[i], this.currentQuestions[j]] = [this.currentQuestions[j], this.currentQuestions[i]];
        }
      }
      this.renderQuestions();
    },

    renderQuestions: function() {
      const container = document.getElementById('questionsContainer');
      let html = '';
      this.currentQuestions.forEach((q, idx) => {
        let statusClass = 'pending-badge', statusText = '⏳ 待批';
        if(q.isCorrect === true) { statusClass = 'correct-badge'; statusText = '✅ 正确'; }
        else if(q.isCorrect === false) { statusClass = 'wrong-badge'; statusText = '❌ 错误'; }

        const inputDisabled = (!this.active && this.secondsLeft <= 0) || this.submitted ? 'disabled' : '';
        
        let optionsHtml = '';
        if (q.options && q.options.length > 0) {
          optionsHtml = '<div class="options-group">';
          q.options.forEach((opt, i) => {
            const letter = String.fromCharCode(65 + i);
            optionsHtml += `
              <label>
                <input type="radio" name="opt_${idx}" value="${letter}" ${q.userAnswer === letter ? 'checked' : ''}>
                ${opt}
              </label>
            `;
          });
          optionsHtml += '</div>';
        }

        html += `<div class="ques-item">
          <div class="ques-header">
            <span class="ques-text">${idx+1}. ${q.text}</span>
            <span class="meta-badge">${q.mainCat} · ${q.subCat}</span>
          </div>
          ${q.svg ? `<div class="geometry-svg">${q.svg}</div>` : ''}
          <div class="answer-area">
            ${optionsHtml}
            <input class="ans-input" type="text" id="ans_${idx}" placeholder="输入答案" value="${q.userAnswer || ''}" ${inputDisabled}>
            <span class="result-badge ${statusClass}">${statusText}</span>
          </div>
          ${q.isCorrect !== null ? `
          <div class="hint-section">
            <div class="child-hint">${q.childHint || '🤔 再想想'}</div>
            <button class="parent-btn" onclick="toggleParentHint(${idx})">🔍 家长查看解析</button>
            <div class="parent-hint hidden" id="parentHint_${idx}">📝 ${q.parentHint || '暂无解析'}</div>
          </div>
          ` : ''}
        </div>`;
      });
      container.innerHTML = html;
    },

    submitAll: function() {
      this.currentQuestions.forEach((q, idx) => {
        const radioButtons = document.getElementsByName(`opt_${idx}`);
        let selectedOption = '';
        for (let rb of radioButtons) {
          if (rb.checked) {
            selectedOption = rb.value;
            break;
          }
        }
        
        const input = document.getElementById(`ans_${idx}`);
        q.userAnswer = selectedOption || (input ? input.value.trim() : '');
      });

      let correct = 0;
      this.currentQuestions.forEach(q => {
        let right = false;
        if (typeof q.ans === 'number') {
          right = Math.abs(parseFloat(q.userAnswer) - q.ans) < 0.01;
        } else {
          right = q.userAnswer.trim().toUpperCase() === q.ans.toString().toUpperCase();
        }
        q.isCorrect = right;
        if(right) correct++;
        else if(q.userAnswer) this.addMistake(q);
      });
      
      const percent = ((correct/this.currentQuestions.length)*100).toFixed(1);
      this.addLog(`📊 提交答案 - 正确率: ${correct}/${this.currentQuestions.length} (${percent}%)`);
      
      if(this.timerInterval) {
        clearInterval(this.timerInterval);
        this.timerInterval = null;
      }
      this.active = false;
      this.submitted = true;
      document.getElementById('submitBtn').disabled = true;
      document.getElementById('startBtn').disabled = false;
      this.renderQuestions();
    },

    addMistake: function(q) {
      const exists = this.mistakeList.some(m => m.text === q.text && m.correctAns === q.ans);
      if (!exists) {
        this.mistakeList.unshift({
          text: q.text,
          correctAns: q.ans,
          mainCat: q.mainCat,
          subCat: q.subCat,
          childHint: q.childHint,
          parentHint: q.parentHint,
          date: new Date().toLocaleTimeString()
        });
        if(this.mistakeList.length > 20) this.mistakeList.pop();
        this.saveMistakes();
        this.updateMistakeUI();
      }
    },

    updateMistakeUI: function() {
      const div = document.getElementById('mistakeContainer');
      if(!this.mistakeList.length) {
        div.innerHTML = '📕 还没有错题，继续加油！';
        return;
      }
      let html = '<strong>📕 错题本 (最近5条)</strong>';
      this.mistakeList.slice(0,5).forEach(m => {
        html += `<div class="mistake-item">
          <div><b>${m.text}</b> 正确答案: ${m.correctAns} [${m.subCat}]</div>
          <div class="child-hint" style="margin-top:8px;">🤔 ${m.childHint}</div>
          <div class="parent-hint" style="margin-top:5px;">📝 ${m.parentHint}</div>
          <div style="font-size:0.8rem; color:#999; margin-top:5px;">${m.date}</div>
        </div>`;
      });
      div.innerHTML = html;
    },

    addLog: function(msg) {
      const logDiv = document.getElementById('historyLog');
      const entry = document.createElement('div');
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      logDiv.prepend(entry);
      if(logDiv.children.length > 8) logDiv.removeChild(logDiv.lastChild);
    },

    clearMistakes: function() {
      this.mistakeList = [];
      this.saveMistakes();
      this.updateMistakeUI();
      this.addLog('🗑️ 清空错题本');
    },

    exportMistakes: function() {
      alert(JSON.stringify(this.mistakeList, null, 2));
    },

    addDemoMistake: function() {
      this.addMistake({
        text: "📐 直角三角形两条直角边分别是3和4，斜边是多少？",
        ans: 5,
        mainCat: "奥数题",
        subCat: "勾股定理",
        childHint: "🤔 两直角边的平方和等于斜边的平方",
        parentHint: "3² + 4² = 9 + 16 = 25，√25 = 5"
      });
    },

    saveMistakes: function() {
      localStorage.setItem('geometryMistakes', JSON.stringify(this.mistakeList));
    },

    loadMistakes: function() {
      const data = localStorage.getItem('geometryMistakes');
      if(data) this.mistakeList = JSON.parse(data);
      this.updateMistakeUI();
    }
  };

  window.app = app;
  window.onload = () => app.init();
})();
</script>
</body>
</html>
